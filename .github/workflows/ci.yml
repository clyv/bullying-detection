name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Only the pure-numpy logic is tested in CI — torch/ultralytics are
      # imported lazily in the source precisely so this stays fast and GPU-free.
      - run: pip install numpy ruff pytest
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -v
