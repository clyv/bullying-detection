name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # CPU-only torch keeps CI GPU-free and fast; ultralytics is still imported
      # lazily in the source so it never needs installing here.
      - run: pip install numpy ruff pytest pyyaml
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest -v
