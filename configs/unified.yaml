# Phase 4 — unified aggressive-vs-neutral model across all datasets.
# Each dataset's native classes are collapsed to binary via src/datasets/taxonomy.py.
experiment: phase4_unified

data:
  num_frames: 64
  max_persons: 2
  # Center+scale each skeleton per clip so the three datasets' different camera
  # resolutions share one space — essential for cross-dataset transfer.
  normalize: true
  datasets:
    - {name: ut_interaction, cache: outputs/ut_poses}
    - {name: bullying10k,    cache: outputs/b10k_poses}
    - {name: ntu,            cache: outputs/ntu_poses}

model:
  name: stgcn
  num_classes: 2
  class_names: [neutral, aggressive]
  graph: coco17
  in_channels: 3

training:
  batch_size: 16
  epochs: 40
  lr: 0.01
  weight_decay: 0.0001
  device: cuda
  seed: 42

# Phase 5 — sliding-window temporal localization on a continuous stream.
localization:
  window: 64        # frames per window (match training num_frames)
  stride: 16        # hop between windows; smaller = finer temporal resolution
  threshold: 0.5    # aggression probability above which a window is flagged
  max_gap: 16       # merge incidents separated by <= this many frames

# Crowd scenes (visualize.py with >2 tracked people): the 2-person model scans
# every interacting pair; crowd-pressure spikes catch sudden gatherings the
# pose model can't see into (victim occluded under the crowd).
crowd:
  max_persons: 16      # people tracked during pose extraction
  max_pairs: 16        # interacting pairs scored per window
  pressure_weight: 1.5 # scale on crowd-convergence spikes blended into the score
  baseline_seconds: 10 # trailing window defining "normal" crowd density
  crowd_aware: true # score nearby two-person pairs instead of diluting crowds
  max_pairs: 24     # closest candidate pairs scored per window
  pose_max_persons: 12 # keep more people for crowd videos; model still scores pairs
  focus_percentile: 90 # show the strongest crowd-pressure moments, not the whole clip
  focus_min_threshold: 0.65
  focus_max_gap: 120   # join close bursts within the same confrontation
  focus_top_incidents: 1
  target_white_shirt: true # follow upper-frame white-shirt target pressure
  target_weight: 0.25
  target_smooth_frames: 90
  target_keep_early_before: 30
  target_keep_padding: 45
  target_keep_percentile: 80
